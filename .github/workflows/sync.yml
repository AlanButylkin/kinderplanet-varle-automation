name: Update Varle XML

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: varle-feed-update
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_XML_URL: https://www.kinderplanet.lt/userfiles/imex/verskis_xml/export/A_A_3f6de1fdd8d81e162850b9cd040a0c14-full.xml

    steps:
      - name: Load automation
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test safety rules
        run: python -m unittest discover -s tests -v

      - name: Download current published feed
        shell: bash
        run: |
          mkdir -p run
          current_tag=""
          while read -r candidate_tag; do
            rm -f run/varle.xml
            if gh release download "$candidate_tag" --repo "$GITHUB_REPOSITORY" --pattern varle.xml --dir run 2>/dev/null; then
              current_tag="$candidate_tag"
              break
            fi
          done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,publishedAt --jq 'sort_by(.publishedAt) | reverse | .[].tagName')
          if [ -z "$current_tag" ]; then
            echo "No valid release containing varle.xml was found."
            exit 1
          fi
          gh release download "$current_tag" --repo "$GITHUB_REPOSITORY" --pattern state.json --dir run || true

      - name: Build and validate updated feed
        run: |
          python sync_varle.py \
            --source "$SOURCE_XML_URL" \
            --main run/varle.xml \
            --output run/candidate.xml \
            --state run/state.json \
            --report run/report.json

      - name: Publish without changing the public link
        shell: bash
        run: |
          cp run/candidate.xml run/varle.xml
          new_tag="feed-$(date -u +%Y%m%d-%H%M%S)"
          gh release create "$new_tag" \
            run/varle.xml \
            run/state.json \
            run/report.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "Validated catalogue $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --notes "Automatically validated KinderPlanet catalogue feed." \
            --latest

      - name: Keep the latest eight recovery versions
        shell: bash
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json tagName,publishedAt \
            --jq 'sort_by(.publishedAt) | reverse | .[8:] | .[].tagName' |
          while read -r old_tag; do
            [ -z "$old_tag" ] || gh release delete "$old_tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          done

      - name: Prevent scheduled-workflow inactivity shutdown
        if: ${{ github.event_name == 'schedule' }}
        continue-on-error: true
        shell: bash
        run: |
          if [ "$(date -u +%d-%H-%M)" = "01-03-17" ]; then
            git config user.name "kinderplanet-automation"
            git config user.email "actions@users.noreply.github.com"
            date -u +%Y-%m-%dT%H:%M:%SZ > .github/automation-heartbeat.txt
            git add .github/automation-heartbeat.txt
            git commit -m "Keep hourly automation active"
            git pull --rebase
            git push
          fi
