name: Update Varle XML

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: varle-feed-update
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_XML_URL: https://www.kinderplanet.lt/userfiles/imex/verskis_xml/export/A_A_3f6de1fdd8d81e162850b9cd040a0c14-full.xml

    steps:
      - name: Load automation
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test safety rules
        run: python -m unittest discover -s tests -v

      - name: Download current published feed
        shell: bash
        run: |
          mkdir -p run
          current_tag=""
          while read -r candidate_tag; do
            rm -f run/varle.xml
            if gh release download "$candidate_tag" --repo "$GITHUB_REPOSITORY" --pattern varle.xml --dir run 2>/dev/null; then
              current_tag="$candidate_tag"
              break
            fi
          done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,publishedAt --jq 'sort_by(.publishedAt) | reverse | .[].tagName')
          if [ -z "$current_tag" ]; then
            echo "No valid release containing varle.xml was found."
            exit 1
          fi
          gh release download "$current_tag" --repo "$GITHUB_REPOSITORY" --pattern state.json --dir run || true
          gh release download "$current_tag" --repo "$GITHUB_REPOSITORY" --pattern catalog-state.json.gz --dir run || true

      - name: Download Verskis catalogue once
        shell: bash
        run: |
          curl --fail --location \
            --retry 3 \
            --retry-delay 5 \
            --connect-timeout 30 \
            --max-time 240 \
            "$SOURCE_XML_URL" \
            --output run/source.xml

      - name: Build and validate updated feed
        run: |
          python sync_varle.py \
            --source run/source.xml \
            --main run/varle.xml \
            --output run/candidate.xml \
            --state run/state.json \
            --report run/report.json

      - name: Track catalogue additions removals and field changes
        run: |
          python catalog_tracker.py \
            --source run/source.xml \
            --varle run/candidate.xml \
            --previous-state run/catalog-state.json.gz \
            --output-state run/catalog-state.json.gz \
            --report run/catalog-report.json \
            --current-csv run/catalog-current.csv \
            --events-csv run/catalog-events.csv \
            --latest-changes-csv run/catalog-latest-changes.csv \
            --new-products-csv run/new-products.csv \
            --removed-products-csv run/removed-products.csv \
            --not-in-varle-csv run/not-in-varle.csv \
            --workbook run/catalog-latest.xlsx
          gzip -9 -c run/catalog-current.csv > run/catalog-current.csv.gz
          gzip -9 -c run/catalog-events.csv > run/catalog-events.csv.gz

      - name: Add catalogue summary
        shell: bash
        run: |
          {
            echo "## Catalogue inspection"
            echo
            echo "- Tracked records: $(jq -r .tracked_records run/catalog-report.json)"
            echo "- New products: $(jq -r .added_products run/catalog-report.json)"
            echo "- Removed products: $(jq -r .removed_products run/catalog-report.json)"
            echo "- Restored products: $(jq -r .restored_products run/catalog-report.json)"
            echo "- Field changes: $(jq -r .field_changes run/catalog-report.json)"
            echo "- Source products not in Varle: $(jq -r .not_in_varle run/catalog-report.json)"
            echo "- Duplicate source codes: $(jq -r .source_duplicate_codes run/catalog-report.json)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare GitHub Pages XML
        shell: bash
        run: |
          mkdir -p run/pages
          cp run/candidate.xml run/pages/varle.xml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: run/pages

      - name: Publish without changing the public link
        shell: bash
        run: |
          cp run/candidate.xml run/varle.xml
          new_tag="feed-$(date -u +%Y%m%d-%H%M%S)"
          gh release create "$new_tag" \
            run/varle.xml \
            run/state.json \
            run/report.json \
            run/catalog-state.json.gz \
            run/catalog-report.json \
            run/catalog-latest.xlsx \
            run/catalog-current.csv.gz \
            run/catalog-events.csv.gz \
            run/catalog-latest-changes.csv \
            run/new-products.csv \
            run/removed-products.csv \
            run/not-in-varle.csv \
            --repo "$GITHUB_REPOSITORY" \
            --title "Validated catalogue $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --notes "Automatically validated feed plus a full catalogue workbook and change history." \
            --latest

      - name: Keep one autonomous monthly workbook
        shell: bash
        run: |
          if [ "$(date -u +%d)" = "01" ]; then
            month="$(date -u +%Y-%m)"
            monthly_tag="catalog-monthly-$month"
            if ! gh release view "$monthly_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              cp run/catalog-latest.xlsx "run/catalog-$month.xlsx"
              cp run/catalog-events.csv.gz "run/catalog-events-$month.csv.gz"
              gh release create "$monthly_tag" \
                "run/catalog-$month.xlsx" \
                "run/catalog-events-$month.csv.gz" \
                --repo "$GITHUB_REPOSITORY" \
                --title "Catalogue snapshot $month" \
                --notes "Autonomous monthly catalogue snapshot. Monthly snapshots are not removed by feed cleanup."
            fi
          fi

      - name: Keep the latest eight recovery versions
        shell: bash
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json tagName,publishedAt \
            --jq 'map(select(.tagName | startswith("feed-"))) | sort_by(.publishedAt) | reverse | .[8:] | .[].tagName' |
          while read -r old_tag; do
            [ -z "$old_tag" ] || gh release delete "$old_tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          done

      - name: Prevent scheduled-workflow inactivity shutdown
        if: ${{ github.event_name == 'schedule' }}
        continue-on-error: true
        shell: bash
        run: |
          current_month="$(date -u +%Y-%m)"
          if [ "$(date -u +%d)" = "01" ] && ! grep -q "$current_month" .github/automation-heartbeat.txt; then
            git config user.name "kinderplanet-automation"
            git config user.email "actions@users.noreply.github.com"
            date -u +%Y-%m-%dT%H:%M:%SZ > .github/automation-heartbeat.txt
            git add .github/automation-heartbeat.txt
            git commit -m "Keep hourly automation active"
            git pull --rebase
            git push
          fi

  deploy-pages:
    needs: update-feed
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy XML to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
